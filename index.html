<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <title>𝚜𝚊𝚕𝚘𝚗 𝚋𝚊𝚢𝚋𝚎𝚛 Randevu</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      /* ÖZEL YAZI TİPİ VE RENK AYARLARI */
      :root {
        --primary: #FFD700; /* Altın Sarı */
        --bg: #000000; /* Tam Siyah Arka Plan */
        --surface: #121212; /* Koyu Gri Paneller */
        --text: #FFFFFF; /* Beyaz Yazılar */
        --text-muted: #CCCCCC;
        --border: #333333;
        --font-special: "Courier New", Courier, monospace; /* 𝚜𝚊𝚕𝚘𝚗 𝚋𝚊𝚢𝚋𝚎𝚛 stili için */
      }

      body { 
        background-color: var(--bg) !important; 
        color: var(--text) !important; 
        font-family: var(--font-special) !important;
      }

      /* Panel ve Kutuların Arka Planı Siyah/Koyu Gri */
      .panel, .sidebar, .topbar, .appointment-card, .admin-row-box { 
        background-color: var(--surface) !important; 
        border: 1px solid var(--border) !important; 
        color: var(--text) !important;
      }

      /* Başlıklar ve Özel Yazı Stili */
      h1, h2, h3, .brand-mark, .primary-button { 
        font-family: var(--font-special) !important;
        color: var(--text) !important;
      }

      .eyebrow { color: var(--primary) !important; font-weight: bold; }

      /* Form Elemanları: Siyah Arka Plan, Beyaz Yazı */
      input, select, textarea { 
        background-color: #1a1a1a !important; 
        color: #ffffff !important; 
        border: 1px solid var(--primary) !important; 
        padding: 10px;
        border-radius: 5px;
      }

      /* Butonlar: Sarı Arka Plan, Siyah Yazı */
      .primary-button { 
        background-color: var(--primary) !important; 
        color: #000000 !important; 
        border: none !important;
        font-weight: bold !important;
        cursor: pointer;
      }

      .ghost-button { 
        color: var(--primary) !important; 
        border: 1px solid var(--primary) !important; 
        background: transparent !important;
      }

      /* Hizmet Seçim Kutuları */
      .checkbox-label { 
        display: flex; 
        align-items: center; 
        gap: 12px; 
        background: #1a1a1a; 
        padding: 15px; 
        border: 1px solid var(--border); 
        margin-bottom: 8px;
        border-radius: 8px;
      }
      
      .checkbox-label:hover { border-color: var(--primary); }
      
      .service-price-tag { color: var(--primary); font-weight: bold; margin-left: auto; }

      /* Diğer Düzeltmeler */
      .status-grid article span { color: var(--primary) !important; font-size: 2em; font-weight: bold; }
      #totalPriceDisplay { color: var(--primary) !important; font-size: 1.5em; }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand-row">
          <div class="brand-mark" id="brandMark" style="background:var(--primary); color:#000; font-size: 1.5rem; padding: 10px; border-radius: 5px;">SB</div>
          <div>
            <p class="eyebrow">Berber randevu sistemi</p>
            <h1 id="salonNameDisplay" style="letter-spacing: -1px;">𝚜𝚊𝚕𝚘𝚗 𝚋𝚊𝚢𝚋𝚎𝚛</h1>
          </div>
        </div>
        <figure class="shop-photo" style="border: 2px solid var(--primary); margin: 20px 0;">
          <img src="https://images.unsplash.com/photo-1621605815971-fbc98d665033?auto=format&fit=crop&w=1200&q=80" alt="Berber" />
        </figure>
        <div class="status-grid">
          <article><span id="todayCount">0</span><p>Bugün randevu</p></article>
          <article><span id="openSlots">0</span><p>Müsait saat</p></article>
        </div>
      </aside>

      <main class="main-content">
        <header class="topbar">
          <div>
            <p class="eyebrow">Randevu paneli</p>
            <h2>Berberini seç, saatini ayarla</h2>
          </div>
          <div class="top-actions">
            <button class="ghost-button" id="openSettings" type="button">Yönetici Girişi</button>
          </div>
        </header>

        <!-- YÖNETİCİ PANELİ -->
        <section class="panel settings-panel" id="settingsPanel" hidden>
          <div class="section-title"><p class="eyebrow">Yönetim</p><h2>Yetkili Girişi</h2></div>
          <form id="adminLoginForm" class="admin-login-form">
            <div class="field-group">
              <label>Yönetici şifresi</label>
              <input id="adminPinInput" name="adminPin" type="password" required />
            </div>
            <button class="primary-button" type="submit">Giriş Yap</button>
            <p id="adminMessage"></p>
          </form>
          
          <form id="settingsForm" class="settings-form" hidden>
            <div class="field-group">
              <label>Salon Adı</label>
              <input id="salonNameInput" name="salonName" type="text" required />
            </div>
            <div id="serviceSettings"></div>
            <button class="ghost-button" id="addService" type="button">+ Hizmet Ekle</button>
            <div id="barberSettings"></div>
            <button class="ghost-button" id="addBarber" type="button">+ Berber Ekle</button>
            <div class="settings-actions" style="margin-top:20px;">
              <button class="ghost-button" id="lockSettings" type="button">Kilitle</button>
              <button class="primary-button" type="submit">Kaydet</button>
            </div>
            <p id="settingsMessage"></p>
          </form>
        </section>

        <section class="workspace-grid">
          <section class="panel booking-panel" id="bookingPanel">
            <div class="section-title"><p class="eyebrow">Randevu Al</p><h2>Bilgilerinizi Girin</h2></div>
            <form id="bookingForm" class="booking-form">
              <div class="field-group">
                <label>Ad soyad</label>
                <input id="customerName" name="customerName" type="text" required />
              </div>
              <div class="field-group">
                <label>Telefon</label>
                <input id="customerPhone" name="customerPhone" type="tel" placeholder="05xx xxx xx xx" required />
              </div>
              <div class="field-group">
                <label>Berber</label>
                <select id="barberSelect" name="barberSelect" required></select>
              </div>
              <div class="field-group">
                <label>Hizmetler</label>
                <div id="serviceCheckboxes" class="checkbox-grid"></div>
                <div style="text-align: right; padding: 10px;">
                   Toplam: <span id="totalPriceDisplay">₺0</span>
                </div>
              </div>
              <div class="field-row">
                <div class="field-group"><label>Tarih</label><input id="dateSelect" name="dateSelect" type="date" required /></div>
                <div class="field-group"><label>Saat</label><select id="timeSelect" name="timeSelect" required></select></div>
              </div>
              <p id="formMessage"></p>
              <button class="primary-button submit-button" type="submit" style="width: 100%; padding: 15px;">RANDEVUYU ONAYLA</button>
            </form>
          </section>

          <aside>
            <section class="panel team-panel">
              <div class="section-title"><p class="eyebrow">Ekip</p><h2>Berberler</h2></div>
              <div class="barber-list" id="barberList"></div>
            </section>
            
            <section class="panel" style="margin-top: 20px; border-color: #ff4d4d !important;">
              <div class="section-title"><p class="eyebrow" style="color: #ff4d4d !important;">Randevu İptali</p><h2>İptal Kodu</h2></div>
              <form id="cancelForm">
                <input id="cancelCodeInput" name="cancelCode" type="text" placeholder="Kodunuzu yazın" required style="width: 100%; margin-bottom: 10px;" />
                <button class="primary-button" type="submit" style="background: #ff4d4d !important; color: white !important; width: 100%;">İPTAL ET</button>
                <p id="cancelMessage"></p>
              </form>
            </section>
          </aside>
        </section>

        <section class="panel schedule-panel">
          <div class="section-title"><p class="eyebrow">Müsaitlik</p><h2>Saat Seçimi</h2></div>
          <div class="slot-board" id="slotBoard"></div>
        </section>

        <section class="panel appointments-panel" id="appointmentsPanel" hidden>
          <div class="section-title"><p class="eyebrow">Yönetici</p><h2>Randevu Listesi</h2></div>
          <div id="appointmentsList"></div>
        </section>
      </main>
    </div>
    <script src="app.js"></script>
  </body>
</html>
