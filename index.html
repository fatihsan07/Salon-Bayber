<!doctype html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Salon Bayber VIP Randevu</title>

<style>
:root{
  --primary:#FFD700;
  --bg:#050505;
  --surface:#111111;
  --text:#ffffff;
  --border:#222222;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

main{
  padding:20px;
  max-width:1200px;
  margin:auto;
}

.panel{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:18px;
  padding:20px;
  margin-bottom:20px;
}

h2{
  margin-top:0;
}

.booking-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:20px;
}

@media(min-width:900px){
  .booking-grid{
    grid-template-columns:1fr 1fr;
  }
}

input,
select{
  width:100%;
  padding:14px;
  margin-bottom:14px;
  border-radius:12px;
  border:1px solid #333;
  background:#0a0a0a;
  color:white;
  font-size:16px;
  outline:none;
}

input:focus,
select:focus{
  border-color:var(--primary);
}

.primary-button{
  width:100%;
  border:none;
  padding:16px;
  border-radius:12px;
  background:var(--primary);
  color:black;
  font-weight:800;
  font-size:16px;
  cursor:pointer;
}

.v-card{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#0a0a0a;
  border:2px solid var(--border);
  border-radius:14px;
  padding:15px;
  margin-bottom:12px;
  cursor:pointer;
  transition:0.2s;
}

.v-card.is-checked{
  border-color:var(--primary);
  background:rgba(255,215,0,0.08);
}

.v-service-left{
  display:flex;
  align-items:center;
  gap:12px;
}

.v-check-icon{
  width:22px;
  height:22px;
  border-radius:6px;
  border:2px solid #555;
}

.v-card.is-checked .v-check-icon{
  background:var(--primary);
  border-color:var(--primary);
  position:relative;
}

.v-card.is-checked .v-check-icon::after{
  content:"✓";
  position:absolute;
  top:-1px;
  left:4px;
  color:black;
  font-weight:bold;
}

.v-service-price{
  font-weight:bold;
  color:var(--primary);
}

#slotBoard{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.slot-button{
  border:none;
  background:#151515;
  color:white;
  padding:12px 18px;
  border-radius:12px;
  cursor:pointer;
  border:1px solid #333;
  transition:0.2s;
}

.slot-button:hover{
  border-color:var(--primary);
}

.slot-button.active{
  background:var(--primary);
  color:black;
  font-weight:bold;
}

.whatsapp-float-btn{
  position:fixed;
  right:20px;
  bottom:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:#25D366;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
  text-decoration:none;
}
</style>
</head>

<body>

<a
href="https://api.whatsapp.com/send/?phone=905395960584"
class="whatsapp-float-btn"
target="_blank"
>
<svg width="30" height="30" fill="#fff" viewBox="0 0 16 16">
<path d="M13.601 2.326A7.85 7.85 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c-.003 1.396.366 2.76 1.057 3.965L0 16l4.204-1.102a7.9 7.9 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.9 7.9 0 0 0 13.6 2.326z"/>
</svg>
</a>

<main>

<section class="panel">
<h2>Müsait Saatler</h2>
<div id="slotBoard"></div>
</section>

<div class="booking-grid">

<section class="panel">

<form id="bookingForm">

<input
id="customerName"
placeholder="Ad Soyad"
required
/>

<input
id="customerPhone"
placeholder="Telefon"
required
/>

<select id="barberSelect" required></select>

<div id="serviceCheckboxes"></div>

<input
id="dateSelect"
type="date"
required
/>

<button
class="primary-button"
type="submit"
>
RANDEVUYU OLUŞTUR
</button>

</form>

</section>

<section class="panel">

<h2>Bilgi</h2>

<p>
Lütfen hizmet seçip uygun saati belirleyiniz.
</p>

<p>
Randevu oluşturduktan sonra
berber tarafından onaylanacaktır.
</p>

</section>

</div>

</main>

<script src="app.js"></script>

</body>
</html>
