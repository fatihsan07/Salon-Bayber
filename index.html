<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1f2723" />
    <title>Salon Bayber Randevu</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Salon özeti">
        <div class="brand-row">
          <div class="brand-mark" id="brandMark" aria-hidden="true">BL</div>
          <div>
            <p class="eyebrow">Berber randevu sistemi</p>
            <h1 id="salonNameDisplay">Salon Bayber</h1>
          </div>
        </div>
        <figure class="shop-photo">
          <img src="https://images.unsplash.com/photo-1621605815971-fbc98d665033?auto=format&fit=crop&w=1200&q=80" alt="Profesyonel berber" />
        </figure>
        <div class="status-grid" aria-label="Günlük durum">
          <article><span id="todayCount">0</span><p>Bugün randevu</p></article>
          <article><span id="openSlots">0</span><p>Müsait saat</p></article>
        </div>
      </aside>

      <main class="main-content">
        <header class="topbar">
          <div>
            <p class="eyebrow">Randevu paneli</p>
            <h2>Berberini seç, saatini ayarla</h2>
          </div>
          <div class="top-actions">
            <button class="ghost-button" id="openSettings" type="button">Yönetici</button>
            <button class="primary-button" id="scrollBooking" type="button">Randevu al</button>
          </div>
        </header>

        <section class="panel settings-panel" id="settingsPanel" hidden>
          <div class="section-title"><p class="eyebrow">Salon ayarları</p><h2>Yetkili yönetim</h2></div>
          <form id="adminLoginForm" class="admin-login-form">
            <div class="field-group">
              <label for="adminPinInput">Yönetici şifresi</label>
              <input id="adminPinInput" name="adminPin" type="password" required />
            </div>
            <button class="primary-button" type="submit">Giriş Yap</button>
            <p class="form-message" id="adminMessage"></p>
          </form>
          <form id="settingsForm" class="settings-form">
            <div class="field-group">
              <label for="salonNameInput">Berber salonu adı</label>
              <input id="salonNameInput" name="salonName" type="text" required />
            </div>
            <div class="barber-settings" id="barberSettings"></div>
            <button class="ghost-button add-barber-button" id="addBarber" type="button">Berber ekle</button>
            <div class="settings-actions">
              <button class="ghost-button" id="lockSettings" type="button">Kilitle</button>
              <button class="primary-button" type="submit">Kaydet</button>
            </div>
            <p class="form-message" id="settingsMessage"></p>
          </form>
        </section>

        <section class="workspace-grid">
          <section class="panel booking-panel" id="bookingPanel">
            <div class="section-title"><p class="eyebrow">Yeni randevu</p><h2>Randevu bilgileri</h2></div>
            <form id="bookingForm" class="booking-form">
              <div class="field-group">
                <label for="customerName">Ad soyad</label>
                <input id="customerName" name="customerName" type="text" required />
              </div>
              <div class="field-group">
                <label for="customerPhone">Telefon</label>
                <input id="customerPhone" name="customerPhone" type="tel" placeholder="05xx xxx xx xx" required />
              </div>
              <div class="field-group">
                <label for="serviceSelect">Hizmet</label>
                <select id="serviceSelect" name="serviceSelect" required></select>
              </div>
              <div class="field-group">
                <label for="barberSelect">Berber</label>
                <select id="barberSelect" name="barberSelect" required></select>
              </div>
              <div class="field-row">
                <div class="field-group">
                  <label for="dateSelect">Tarih</label>
                  <input id="dateSelect" name="dateSelect" type="date" required />
                </div>
                <div class="field-group">
                  <label for="timeSelect">Saat</label>
                  <select id="timeSelect" name="timeSelect" required></select>
                </div>
              </div>
              <p class="form-message" id="formMessage"></p>
              <button class="primary-button submit-button" type="submit">Randevuyu onayla</button>
            </form>
          </section>

          <div>
            <section class="panel team-panel">
              <div class="section-title"><p class="eyebrow">Ekip</p><h2>Uygun berberler</h2></div>
              <div class="barber-list" id="barberList"></div>
            </section>
            
            <!-- YENİ İPTAL BÖLÜMÜ -->
            <section class="panel" style="margin-top: 20px;">
              <div class="section-title"><p class="eyebrow">Fikriniz mi değişti?</p><h2>Randevu İptali</h2></div>
              <form id="cancelForm" class="booking-form">
                <div class="field-group">
                  <label for="cancelCodeInput">İptal Kodunuz</label>
                  <input id="cancelCodeInput" name="cancelCode" type="text" placeholder="Örn: A7B2X9" required />
                </div>
                <button class="danger-button submit-button" type="submit" style="margin-top: 10px;">Randevuyu İptal Et</button>
                <p class="form-message" id="cancelMessage"></p>
              </form>
            </section>
          </div>
        </section>

        <section class="panel schedule-panel">
          <div class="section-title"><p class="eyebrow">Takvim</p><h2>Saatler</h2></div>
          <div class="slot-board" id="slotBoard"></div>
        </section>

        <section class="panel appointments-panel" id="appointmentsPanel" hidden>
          <div class="section-title"><p class="eyebrow">Randevular</p><h2>Aktif kayıtlar</h2></div>
          <div class="appointments-list" id="appointmentsList"></div>
        </section>
      </main>
    </div>
    <script src="app.js"></script>
  </body>
</html>
